<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>手機旗艦對戰 · Phone Flagship Battle</title>
<style>
  :root{
    --ink:#1c2742;
    --muted:#6b7794;
    --card:#ffffff;
    --sky1:#7ec8ff; --sky2:#b8e0ff; --sky3:#e8f6ff;
    --perf:#ffb300; --cam:#b15cff; --disp:#22c3e6; --batt:#28cc6a;
    --gold:#ffcc33;
    --radius:20px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC","Microsoft JhengHei",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;
    position:relative;overflow-x:hidden;
    background:
      radial-gradient(120% 80% at 50% -10%, var(--sky3), transparent 60%),
      linear-gradient(180deg,var(--sky1) 0%, var(--sky2) 38%, #d7f0e6 100%);
  }
  /* 擂台地面 */
  body::before{
    content:"";position:fixed;left:-10%;right:-10%;bottom:0;height:42%;z-index:-2;
    background:radial-gradient(60% 120% at 50% 120%, #9be7c0, #6fd6ae 40%, transparent 75%);
    opacity:.55;
  }
  /* 飄浮光點 */
  body::after{
    content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.5;
    background:
      radial-gradient(3px 3px at 18% 30%, #fff, transparent),
      radial-gradient(2px 2px at 72% 22%, #fff, transparent),
      radial-gradient(2px 2px at 40% 60%, #fff, transparent),
      radial-gradient(3px 3px at 88% 55%, #fff, transparent),
      radial-gradient(2px 2px at 10% 75%, #fff, transparent);
    animation:twinkle 4s ease-in-out infinite alternate;
  }
  @keyframes twinkle{from{opacity:.25}to{opacity:.7}}

  #fx{position:fixed;inset:0;z-index:60;pointer-events:none}

  .wrap{max-width:1000px;margin:0 auto;padding:18px 14px 60px;position:relative}
  .wrap.shake{animation:shake .5s cubic-bezier(.36,.07,.19,.97)}
  @keyframes shake{
    10%,90%{transform:translate(-2px,1px)} 20%,80%{transform:translate(4px,-2px)}
    30%,50%,70%{transform:translate(-7px,2px)} 40%,60%{transform:translate(7px,-1px)}
  }

  header{text-align:center;margin-bottom:8px}
  header h1{
    font-size:clamp(26px,6vw,44px);margin:0;letter-spacing:1px;font-weight:900;
    color:#fff;
    text-shadow:0 2px 0 #4aa3e8, 0 4px 0 #3d8fd6, 0 6px 12px rgba(0,60,120,.35),
                3px 3px 0 #ffd24a;
    -webkit-text-stroke:1.5px #2f6fb0;
  }
  header p{margin:4px 0 0;color:#2f5a88;font-size:13.5px;font-weight:700}

  .controls{display:flex;justify-content:center;gap:9px;margin:14px 0 8px;flex-wrap:wrap}
  button{font-family:inherit;font-size:15px;cursor:pointer;border:none;border-radius:999px;
    padding:11px 22px;font-weight:800;transition:transform .08s ease, box-shadow .2s ease, filter .2s ease}
  button:active{transform:translateY(2px) scale(.98)}
  .btn-primary{
    background:linear-gradient(180deg,#ff8a5c,#f0552c);
    color:#fff;border-bottom:4px solid #c93f1c;
    box-shadow:0 4px 0 #c93f1c,0 8px 16px rgba(240,85,44,.4);text-shadow:0 1px 1px rgba(0,0,0,.25);
  }
  .btn-primary:hover{filter:brightness(1.06)}
  .btn-primary:active{border-bottom-width:2px;box-shadow:0 2px 0 #c93f1c}
  .btn-primary:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.4);box-shadow:0 4px 0 #c93f1c}
  .btn-ghost{background:#fff;color:#3a6ea5;border:2px solid #bcd9f3;border-bottom:4px solid #bcd9f3;box-shadow:0 2px 6px rgba(0,60,120,.12)}
  .btn-ghost:hover{border-color:#7fb8ee;color:#1f5fa0}
  .btn-ghost:active{border-bottom-width:2px}

  .arena{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:start;margin-top:6px}
  @media (max-width:720px){
    .arena{grid-template-columns:1fr 1fr;gap:8px}
    .vs{grid-column:1/3;order:0;margin:0 auto 2px}
  }

  .vs{align-self:center;font-weight:900;font-size:18px;color:#fff;
    width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%,#ff6aa8,#e7277b);
    border:4px solid #fff;box-shadow:0 6px 16px rgba(231,39,123,.5);letter-spacing:1px;
    animation:vsPulse 1.4s ease-in-out infinite}
  @keyframes vsPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

  .side{display:flex;flex-direction:column;gap:8px;min-width:0}
  .slot-label{text-align:center;font-size:13px;font-weight:900;color:#2f5a88}
  .pick-row{display:flex;gap:6px;align-items:center;justify-content:center}
  .dice{flex:0 0 auto;padding:8px 12px;font-size:16px;background:#fff;border:2px solid #bcd9f3;border-radius:12px;color:#3a6ea5;font-weight:800}
  .dice:hover{border-color:#7fb8ee}

  /* ---- 寶可夢風卡片 ---- */
  .card-stage{perspective:1100px;min-height:330px}
  .card-stage.active .card.empty{border-color:var(--accent,#ffb300);box-shadow:0 0 0 4px rgba(255,179,0,.35),0 12px 24px rgba(0,60,120,.18);animation:activeGlow 1.1s ease-in-out infinite}
  @keyframes activeGlow{0%,100%{box-shadow:0 0 0 4px rgba(255,179,0,.3),0 12px 24px rgba(0,60,120,.18)}50%{box-shadow:0 0 0 7px rgba(255,179,0,.5),0 12px 24px rgba(0,60,120,.18)}}

  .card{position:relative;background:var(--card);border-radius:var(--radius);overflow:hidden;
    border:4px solid var(--bc,#ffd24a);min-height:120px;
    box-shadow:0 10px 24px rgba(20,60,120,.22), inset 0 0 0 2px #fff;
    transform:
      translateZ(var(--lungeZ,0px))
      rotateX(var(--tiltX,0deg))
      rotateY(calc(var(--tiltY,0deg) + var(--lungeY,0deg)))
      translateY(var(--lift,0px)) rotateZ(var(--rotz,0deg)) scale(var(--scale,1));
    transition:transform .3s cubic-bezier(.22,1,.36,1), box-shadow .35s ease, filter .35s ease;
    will-change:transform}
  .card.flip{animation:flipIn .55s cubic-bezier(.22,1,.36,1)}
  @keyframes flipIn{from{opacity:0;transform:rotateY(-78deg) scale(.9)}to{opacity:1;transform:rotateY(0) scale(1)}}
  .card.empty{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;font-weight:800;min-height:330px;
    border-style:dashed;border-color:#bcd9f3;background:rgba(255,255,255,.6);cursor:pointer;text-align:center;padding:20px}
  .card.lunge-a{--lungeY:24deg;--lungeZ:50px}
  .card.lunge-b{--lungeY:-24deg;--lungeZ:50px}
  .glare{position:absolute;inset:0;z-index:6;pointer-events:none;border-radius:var(--radius);opacity:0;
    transition:opacity .3s ease;
    background:radial-gradient(circle at var(--mx,50%) var(--my,28%), rgba(255,255,255,.45), transparent 42%)}
  .card:hover .glare{opacity:1}

  /* 卡頭名牌 */
  .card-top{display:flex;align-items:center;justify-content:space-between;gap:6px;
    padding:9px 12px;color:#fff;position:relative;
    background:linear-gradient(180deg,var(--bc,#ffd24a),color-mix(in srgb,var(--bc,#ffd24a) 70%,#000 8%))}
  .card-name{min-width:0}
  .card-brand{font-size:10.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;opacity:.95;line-height:1}
  .card-model{font-size:clamp(14px,3.4vw,18px);font-weight:900;line-height:1.15;text-shadow:0 1px 2px rgba(0,0,0,.3);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hp{flex:0 0 auto;text-align:right;line-height:1}
  .hp-label{font-size:9px;font-weight:800;opacity:.9}
  .hp-num{font-size:clamp(16px,4vw,22px);font-weight:900;font-variant-numeric:tabular-nums;text-shadow:0 1px 2px rgba(0,0,0,.3)}
  .hp-num .denom{font-size:11px;opacity:.85}

  /* 擂台窗格 + 手機圖 */
  .art{position:relative;height:clamp(120px,30vw,160px);overflow:hidden;
    background:radial-gradient(70% 90% at 50% 30%, #fffef6, color-mix(in srgb,var(--bc,#ffd24a) 16%,#fff) 70%, color-mix(in srgb,var(--bc,#ffd24a) 26%,#fff));
    border-bottom:3px solid color-mix(in srgb,var(--bc,#ffd24a) 50%,#fff)}
  .art::after{content:"";position:absolute;left:50%;bottom:8px;transform:translateX(-50%);
    width:62%;height:16px;border-radius:50%;background:rgba(40,80,140,.18);filter:blur(3px)}
  .art svg{position:relative;z-index:1;display:block;height:88%;width:auto;margin:6% auto 0;
    filter:drop-shadow(0 8px 10px rgba(20,50,100,.28))}
  .card.is-winner .art svg{animation:winBob 1s ease-in-out infinite}
  @keyframes winBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .yearbadge{position:absolute;top:8px;left:8px;z-index:2;font-size:11px;font-weight:900;color:#fff;
    background:rgba(30,50,90,.55);padding:2px 9px;border-radius:999px}

  /* 招式列 */
  .moves{padding:9px 10px 6px}
  .stat{display:grid;grid-template-columns:auto 1fr auto;gap:7px;align-items:center;margin-bottom:7px}
  .stat:last-of-type{margin-bottom:0}
  .mv-icon{width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;
    background:var(--tc);box-shadow:0 2px 4px rgba(0,0,0,.18);color:#fff}
  .mv-mid{min-width:0}
  .mv-name{font-size:11px;font-weight:800;color:var(--muted);line-height:1.1;margin-bottom:3px}
  .bar{height:8px;border-radius:999px;background:#eef2f8;overflow:hidden;position:relative;box-shadow:inset 0 1px 2px rgba(0,0,0,.08)}
  .bar > i{display:block;height:100%;width:0;border-radius:999px;background:var(--tc);
    transition:width .6s cubic-bezier(.22,1,.36,1)}
  .mv-val{font-size:14px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--ink);min-width:26px;text-align:right;
    transition:color .3s ease, transform .3s ease}
  .stat.win .mv-val{color:#1aa85f;transform:scale(1.25)}
  .stat.win .mv-name::after{content:" ▲ 勝";color:#1aa85f}
  .stat.win .mv-icon{animation:icoPop .5s ease}
  @keyframes icoPop{0%{transform:scale(1)}40%{transform:scale(1.4) rotate(-8deg)}100%{transform:scale(1)}}
  .spec{font-size:10px;color:#9aa6bd;grid-column:2/4;margin-top:-3px;line-height:1.3}

  /* 戰力總槽 */
  .power{margin:4px 10px 12px;padding-top:8px;border-top:2px dashed #e6ebf3}
  .power-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
  .power-label{font-size:11px;color:var(--muted);font-weight:900}
  .power-num{font-size:22px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--ink)}
  .power-num .denom{font-size:11px;color:var(--muted)}
  .power-bar{height:12px;border-radius:999px;background:#eef2f8;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.1)}
  .power-bar > i{display:block;height:100%;width:0;border-radius:999px;
    background:linear-gradient(90deg,#ffd24a,#ff8a3b);transition:width .55s cubic-bezier(.22,1,.36,1)}

  /* 勝負狀態 */
  .card.is-winner{--lift:-10px;--scale:1.05;z-index:3}
  .card.is-winner{box-shadow:0 0 0 4px var(--bc), 0 0 38px color-mix(in srgb,var(--bc) 60%,transparent), 0 14px 30px rgba(20,60,120,.3), inset 0 0 0 2px #fff}
  .card.is-winner .power-num{color:#e8820f}
  .card.is-loser{--rotz:-2deg;--scale:.94;filter:grayscale(.45) brightness(.92)}
  .crown{position:absolute;top:-16px;left:50%;transform:translateX(-50%) scale(0);font-size:34px;z-index:7;
    filter:drop-shadow(0 4px 8px rgba(180,120,0,.5));transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
  .card.is-winner .crown{transform:translateX(-50%) scale(1)}
  .stars{position:absolute;top:8px;right:8px;z-index:7;font-size:18px;letter-spacing:-2px;opacity:0;transform:scale(.4);
    transition:opacity .3s ease, transform .4s cubic-bezier(.34,1.56,.64,1)}
  .card.is-winner .stars{opacity:1;transform:scale(1)}

  /* VICTORY 橫幅 */
  .verdict{text-align:center;margin:18px auto 0;max-width:600px;min-height:30px;
    font-size:clamp(20px,5vw,30px);font-weight:900;opacity:0;transform:scale(.7) translateY(8px);color:#fff;
    text-shadow:0 2px 0 #c93f1c,0 4px 10px rgba(0,0,0,.25);-webkit-text-stroke:1px #b8381a;
    transition:opacity .35s ease, transform .45s cubic-bezier(.34,1.56,.64,1)}
  .verdict.show{opacity:1;transform:scale(1) translateY(0)}
  .verdict .sub{display:block;font-size:14px;font-weight:800;color:#234;margin-top:6px;-webkit-text-stroke:0;text-shadow:none}

  /* 回合提示橫幅 */
  #round{position:fixed;left:0;right:0;top:38%;z-index:58;text-align:center;pointer-events:none;
    font-size:clamp(26px,8vw,56px);font-weight:900;color:#fff;opacity:0;
    text-shadow:0 3px 0 #2f6fb0,0 6px 16px rgba(0,0,0,.35);-webkit-text-stroke:2px #2f6fb0}
  #round.go{animation:roundPop .9s ease both}
  @keyframes roundPop{0%{opacity:0;transform:scale(.4)}25%{opacity:1;transform:scale(1.1)}70%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.15)}}

  /* 飛出的傷害/數字 */
  .dmg{position:fixed;z-index:62;font-weight:900;font-size:clamp(22px,5vw,34px);pointer-events:none;
    color:#fff;-webkit-text-stroke:2px #c93f1c;text-shadow:0 2px 8px rgba(0,0,0,.3)}
  .dmg.super{-webkit-text-stroke:2px #b15cff;font-size:clamp(28px,6vw,44px)}
  @keyframes dmgFloat{0%{opacity:0;transform:translate(-50%,0) scale(.5)}25%{opacity:1;transform:translate(-50%,-22px) scale(1.15)}100%{opacity:0;transform:translate(-50%,-70px) scale(1)}}

  /* 衝撞特效（FIGHT!） */
  #clash{position:fixed;inset:0;z-index:55;display:none;align-items:center;justify-content:center;pointer-events:none}
  #clash.go{display:flex}
  #clash .flash{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.95),rgba(255,225,150,.4) 30%,transparent 55%);opacity:0}
  #clash.go .flash{animation:flash .55s ease .82s both}
  @keyframes flash{0%{opacity:0}20%{opacity:1}100%{opacity:0}}
  #clash .shock{position:absolute;width:40px;height:40px;border-radius:50%;border:6px solid rgba(255,235,170,.95);opacity:0;box-shadow:0 0 40px rgba(255,210,90,.8)}
  #clash.go .shock{animation:shock .8s cubic-bezier(.15,.6,.3,1) .82s both}
  @keyframes shock{0%{opacity:.95;transform:scale(.2)}100%{opacity:0;transform:scale(26)}}
  #clash .sword{position:absolute;font-size:clamp(90px,22vw,220px);opacity:0;
    filter:drop-shadow(0 0 26px rgba(255,140,40,.95)) drop-shadow(0 0 10px rgba(255,90,20,.9))}
  /* 流星拳的火焰殘影：拖在拳頭後方 */
  #clash .sword::before{content:"";position:absolute;top:48%;right:78%;transform:translateY(-50%);
    width:70vw;height:.52em;border-radius:999px;filter:blur(7px);
    background:linear-gradient(90deg,transparent 0%, rgba(255,90,20,.0) 15%, rgba(255,120,30,.55) 55%, rgba(255,190,70,.95) 88%, rgba(255,245,200,1) 100%)}
  #clash.go .swordL{animation:flyL .8s cubic-bezier(.45,0,.3,1) both}
  #clash.go .swordR{animation:flyR .8s cubic-bezier(.45,0,.3,1) both}
  @keyframes flyL{0%{opacity:0;transform:translateX(-100vw) scale(.65)}25%{opacity:1}100%{opacity:1;transform:translateX(-6vw) scale(1.12)}}
  @keyframes flyR{0%{opacity:0;transform:translateX(100vw) scale(.65) scaleX(-1)}25%{opacity:1}100%{opacity:1;transform:translateX(6vw) scale(1.12) scaleX(-1)}}
  #clash .cross{position:absolute;font-size:clamp(120px,30vw,300px);opacity:0;filter:drop-shadow(0 0 34px rgba(255,220,120,.95))}
  #clash.go .cross{animation:crossPop .95s ease .82s both}
  @keyframes crossPop{0%{opacity:0;transform:scale(.2) rotate(-30deg)}28%{opacity:1;transform:scale(1.35) rotate(10deg)}50%{transform:scale(1.08) rotate(-4deg)}75%{opacity:1;transform:scale(1.15)}100%{opacity:0;transform:scale(1.7)}}

  /* ---- 選角格子牆 ---- */
  .roster-wrap{margin-top:22px;background:rgba(255,255,255,.7);border:3px solid #cfe6fb;border-radius:18px;padding:12px 12px 14px;
    box-shadow:0 8px 20px rgba(20,60,120,.12)}
  .roster-title{text-align:center;font-size:14px;font-weight:900;color:#2f5a88;margin:0 0 10px}
  .roster-title b{color:#e8820f}
  .brandgroup{margin-bottom:10px}
  .brandgroup h3{margin:0 0 6px;font-size:12px;font-weight:900;color:#5a6b88;padding-left:4px;
    border-left:4px solid var(--bg-c,#ccc);line-height:1.2}
  .roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px}
  .tile{background:#fff;border:2px solid #e2eaf4;border-radius:14px;padding:6px 4px 5px;cursor:pointer;text-align:center;
    transition:transform .08s ease, border-color .15s ease, box-shadow .15s ease}
  .tile:hover{border-color:var(--tc2,#7fb8ee);transform:translateY(-2px);box-shadow:0 6px 12px rgba(20,60,120,.15)}
  .tile:active{transform:translateY(0)}
  .tile.picked{border-color:var(--tc2);box-shadow:0 0 0 3px color-mix(in srgb,var(--tc2) 35%,transparent)}
  .tile svg{width:34px;height:54px;display:block;margin:0 auto 3px}
  .tile .tn{font-size:9.5px;font-weight:800;color:var(--ink);line-height:1.1;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:21px}
  .tile .ty{font-size:9px;color:#9aa6bd;font-weight:700}

  /* QR 彈窗 */
  #qrModal{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;
    background:rgba(20,40,80,.5);backdrop-filter:blur(4px);padding:20px}
  #qrModal.open{display:flex;animation:fadeIn .2s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .qr-box{position:relative;background:#fff;border:4px solid #ffd24a;border-radius:22px;
    padding:26px 26px 22px;text-align:center;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4);
    animation:popIn .35s cubic-bezier(.34,1.56,.64,1)}
  @keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
  .qr-box h2{margin:0 0 16px;font-size:18px;font-weight:900;color:#2f5a88}
  .qr-img{background:#fff;padding:10px;border-radius:16px;display:inline-block;line-height:0;border:2px solid #eef2f8}
  .qr-img svg{width:min(62vw,230px);height:auto;image-rendering:pixelated}
  .qr-url{margin-top:16px;font-size:15px;font-weight:900;color:#e8820f;word-break:break-all}
  .qr-hint{margin-top:10px;font-size:12.5px;color:var(--muted);line-height:1.6}
  .qr-close{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--muted);
    font-size:26px;line-height:1;padding:4px 8px;cursor:pointer}

  footer{text-align:center;color:#5a6b88;font-size:11.5px;margin-top:30px;line-height:1.7}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001s!important;animation-iteration-count:1!important;transition-duration:.05s!important}
  }
</style>
</head>
<body>
<canvas id="fx"></canvas>
<div id="round"></div>
<div id="clash">
  <div class="flash"></div>
  <div class="shock"></div>
  <div class="sword swordL">🤜</div>
  <div class="sword swordR">🤜</div>
  <div class="cross">💥</div>
</div>

<div id="qrModal">
  <div class="qr-box">

// ---- 音效（Web Audio 即時合成）----
let audioCtx=null, soundOn=true;
function actx(){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended") audioCtx.resume();
  return audioCtx;
}
function noiseBuf(ac,dur,shape){
  const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*dur),ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,shape);
  return buf;
}
function metalClang(t0){
  if(!soundOn) return;
  const ac=actx(), t=t0||ac.currentTime;
  const src=ac.createBufferSource(); src.buffer=noiseBuf(ac,0.5,2);
  const bp=ac.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=3400; bp.Q.value=0.9;
  const g=ac.createGain(); g.gain.setValueAtTime(0.55,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
  src.connect(bp).connect(g).connect(ac.destination); src.start(t);
  [1,1.71,2.43,3.16,4.08].forEach((r,i)=>{
    const o=ac.createOscillator(); o.type="square"; o.frequency.value=1740*r;
    const og=ac.createGain(); og.gain.setValueAtTime(0.13/(i+1),t); og.gain.exponentialRampToValueAtTime(0.001,t+0.38);
    o.connect(og).connect(ac.destination); o.start(t); o.stop(t+0.42);
  });
}
function explosion(t0){
  if(!soundOn) return;
  const ac=actx(), t=t0||ac.currentTime, dur=0.95;
  const src=ac.createBufferSource(); src.buffer=noiseBuf(ac,dur,1.4);
  const lp=ac.createBiquadFilter(); lp.type="lowpass";
  lp.frequency.setValueAtTime(1900,t); lp.frequency.exponentialRampToValueAtTime(110,t+dur);
  const g=ac.createGain(); g.gain.setValueAtTime(0.95,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.connect(lp).connect(g).connect(ac.destination); src.start(t);
  const o=ac.createOscillator(); o.type="sine";
  o.frequency.setValueAtTime(130,t); o.frequency.exponentialRampToValueAtTime(34,t+0.55);
  const og=ac.createGain(); og.gain.setValueAtTime(0.9,t); og.gain.exponentialRampToValueAtTime(0.001,t+0.6);
  o.connect(og).connect(ac.destination); o.start(t); o.stop(t+0.65);
}
// 出招「咻」聲（屬性光彈）
function zap(){
  if(!soundOn) return;
  const ac=actx(), t=ac.currentTime;
  const o=ac.createOscillator(); o.type="sawtooth";
  o.frequency.setValueAtTime(900,t); o.frequency.exponentialRampToValueAtTime(180,t+0.22);
  const g=ac.createGain(); g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.24);
  o.connect(g).connect(ac.destination); o.start(t); o.stop(t+0.26);
}
function fanfare(){
  if(!soundOn) return;
  const ac=actx(), t=ac.currentTime;
  [523,659,784,1046].forEach((f,i)=>{
    const o=ac.createOscillator(); o.type="triangle"; o.frequency.value=f;
    const g=ac.createGain(); const st=t+i*0.1;
    g.gain.setValueAtTime(0.0001,st); g.gain.exponentialRampToValueAtTime(0.22,st+0.03); g.gain.exponentialRampToValueAtTime(0.001,st+0.4);
    o.connect(g).connect(ac.destination); o.start(st); o.stop(st+0.45);
  });
}
function stampThud(){
  if(!soundOn) return;
  const ac=actx(), t=ac.currentTime;
  const o=ac.createOscillator(); o.type="sine";
  o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(48,t+0.18);
  const g=ac.createGain(); g.gain.setValueAtTime(0.7,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
  o.connect(g).connect(ac.destination); o.start(t); o.stop(t+0.24);
  const s=ac.createBufferSource(); s.buffer=noiseBuf(ac,0.12,3);
  const sg=ac.createGain(); sg.gain.setValueAtTime(0.35,t); sg.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  s.connect(sg).connect(ac.destination); s.start(t);
}

// ---- 背景音樂 ----
let bgmOn=false, bgmTimer=null, bgStep=0, nextStepTime=0, musicGain=null;
const STEP=0.1075;
const HZ={A2:110,C3:130.81,D3:146.83,E3:164.81,G3:196,A3:220,C4:261.63,D4:293.66,E4:329.63,G4:392,A4:440,C5:523.25,D5:587.33,E5:659.25,G5:783.99,A5:880};
const BASS=["A2",0,"A2",0,"A2",0,"C3",0,"G3",0,0,"G3",0,"E3",0,0];
const LEAD=["A4","C5","E5","A5","E5","C5","D5","E5","C5","A4","G4","A4","E4","G4","A4","C5"];
const KICK=[1,0,0,0,1,0,0,0,1,0,0,0,1,0,0,0];
const HAT =[0,0,1,0,0,0,1,0,0,0,1,0,0,1,1,0];
function bgKick(t){const ac=audioCtx,o=ac.createOscillator(),g=ac.createGain();o.type="sine";
  o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(45,t+0.12);
  g.gain.setValueAtTime(0.9,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
  o.connect(g).connect(musicGain);o.start(t);o.stop(t+0.18);}
function bgHat(t){const ac=audioCtx,s=ac.createBufferSource();s.buffer=noiseBuf(ac,0.05,1);
  const hp=ac.createBiquadFilter();hp.type="highpass";hp.frequency.value=7000;
  const g=ac.createGain();g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.04);
  s.connect(hp).connect(g).connect(musicGain);s.start(t);}
function bgBass(t,f){const ac=audioCtx,o=ac.createOscillator(),g=ac.createGain();o.type="sawtooth";
  o.frequency.value=f;const lp=ac.createBiquadFilter();lp.type="lowpass";lp.frequency.value=900;
  g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.32,t+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
  o.connect(lp).connect(g).connect(musicGain);o.start(t);o.stop(t+0.18);}
function bgLead(t,f){const ac=audioCtx,o=ac.createOscillator(),g=ac.createGain();o.type="square";
  o.frequency.value=f;g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.12,t+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+0.13);
  o.connect(g).connect(musicGain);o.start(t);o.stop(t+0.15);}
function bgScheduler(){
  while(nextStepTime < audioCtx.currentTime + 0.15){
    const s=bgStep%16;
    if(KICK[s]) bgKick(nextStepTime);
    if(HAT[s])  bgHat(nextStepTime);
    if(BASS[s]) bgBass(nextStepTime, HZ[BASS[s]]);
    if(LEAD[s] && s%2===0) bgLead(nextStepTime, HZ[LEAD[s]]);
    nextStepTime += STEP; bgStep++;
  }
}
function startBGM(){
  const ac=actx();
  if(!musicGain){musicGain=ac.createGain();musicGain.gain.value=0.22;musicGain.connect(ac.destination);}
  if(bgmTimer) return;
  bgmOn=true; bgStep=0; nextStepTime=ac.currentTime+0.1;
  bgmTimer=setInterval(bgScheduler,25);
  document.getElementById("musicBtn").textContent="🎵 音樂 ▮▮";
}
function stopBGM(){
  bgmOn=false; if(bgmTimer){clearInterval(bgmTimer);bgmTimer=null;}
  document.getElementById("musicBtn").textContent="🎵 音樂";
}
// 分頁切到背景時暫停音樂排程，省電
document.addEventListener("visibilitychange",()=>{
  if(document.hidden && bgmTimer){clearInterval(bgmTimer);bgmTimer=null;}
  else if(!document.hidden && bgmOn && !bgmTimer){nextStepTime=audioCtx.currentTime+0.1;bgmTimer=setInterval(bgScheduler,25);}
});

// ---- 粒子引擎 ----
const cvs=document.getElementById("fx"), ctx=cvs.getContext("2d");
function sizeCanvas(){cvs.width=innerWidth;cvs.height=innerHeight;}
sizeCanvas(); addEventListener("resize",sizeCanvas);
let parts=[], raf=null;
function spawn(x,y,n,colors,power){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=Math.random()*power+2;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-Math.random()*4,
      g:.18+Math.random()*.12,size:5+Math.random()*8,rot:Math.random()*6,vr:(Math.random()-.5)*.4,
      color:colors[(Math.random()*colors.length)|0],life:1});
  }
  if(!raf) raf=requestAnimationFrame(loop);
}
function loop(){
  ctx.clearRect(0,0,cvs.width,cvs.height);
  parts.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life-=.0075;
    ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.55);ctx.restore();});
  parts=parts.filter(p=>p.life>0&&p.y<cvs.height+60);
  if(parts.length) raf=requestAnimationFrame(loop); else {raf=null;ctx.clearRect(0,0,cvs.width,cvs.height);}
}
function burstAt(el,colors,n=26,power=7){
  const r=el.getBoundingClientRect();
  spawn(r.left+r.width/2, r.top+r.height/2, n, colors, power);
}
// 屬性光彈：從攻擊方飛向對手
function projectile(fromEl,toEl,color){
  const a=fromEl.getBoundingClientRect(), b=toEl.getBoundingClientRect();
  const x0=a.left+a.width/2, y0=a.top+a.height/2, x1=b.left+b.width/2, y1=b.top+b.height/2;
  const dot=document.createElement("div");
  dot.style.cssText=`position:fixed;z-index:61;left:${x0}px;top:${y0}px;width:22px;height:22px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff,${color});box-shadow:0 0 18px ${color};pointer-events:none;transform:translate(-50%,-50%)`;
  document.body.appendChild(dot);
  dot.animate([{left:x0+"px",top:y0+"px",opacity:1,offset:0},
               {left:x1+"px",top:y1+"px",opacity:1,offset:.85},
               {left:x1+"px",top:y1+"px",opacity:0,offset:1}],
              {duration:420,easing:"cubic-bezier(.5,0,.5,1)"}).onfinish=()=>dot.remove();
  setTimeout(()=>{spawn(x1,y1,16,[color,"#fff"],6);},400);
}
// 飛出的數字
function popNum(el,text,cls){
  const r=el.getBoundingClientRect();
  const d=document.createElement("div");
  d.className="dmg"+(cls?" "+cls:"");
  d.textContent=text;
  d.style.left=(r.left+r.width/2)+"px"; d.style.top=(r.top+r.height*0.4)+"px";

// ---- 對戰流程 ----
async function battle(){
  if(busy) return;
  const a=state.A,b=state.B; if(!a||!b) return;
  busy=true;
  document.getElementById("battleBtn").disabled=true;
  document.getElementById("randomBtn").disabled=true;

  const v=document.getElementById("verdict"); v.classList.remove("show");
  renderCard("A",true); renderCard("B",true);
  const cardA=document.querySelector("#cardA .card"), cardB=document.querySelector("#cardB .card");
  if(matchMedia("(hover:none)").matches) enableGyro();

  // 1) FIGHT! 雙劍交擊
  if(soundOn) actx();
  if(bgmOn && !bgmTimer){startBGM();}
  await roundBanner("準備…");
  const clash=document.getElementById("clash"); clash.classList.add("go");
  await sleep(820);
  metalClang();
  document.getElementById("wrap").classList.add("shake");
  cardA.classList.add("lunge-a"); cardB.classList.add("lunge-b");
  spawn(innerWidth/2, innerHeight*0.42, 90, ["#fff","#ffe9a8","#ffd24a","#ffa53b","#9cc7ff"], 14);
  await sleep(130);
  explosion();
  spawn(innerWidth/2, innerHeight*0.42, 70, ["#ff7a3b","#ffd24a","#fff","#e7277b"], 11);
  await sleep(560);
  clash.classList.remove("go");
  document.getElementById("wrap").classList.remove("shake");
  cardA.classList.remove("lunge-a"); cardB.classList.remove("lunge-b");
  await sleep(150);

  // 2) 逐項出招
  let accA=0, accB=0;
  for(const st of STATS){
    await roundBanner(`${st.icon} ${st.label} 對決！`);
    const av=a[st.key], bv=b[st.key];
    const sa=document.querySelector(`#cardA .stat[data-key="${st.key}"]`);
    const sb=document.querySelector(`#cardB .stat[data-key="${st.key}"]`);
    sa.querySelector(".bar>i").style.width=av+"%";
    sb.querySelector(".bar>i").style.width=bv+"%";
    zap();
    await sleep(380);
    const col=STATCOL[st.key], diff=Math.abs(av-bv);
    if(av>bv){
      sa.classList.add("win");
      projectile(sa,sb,col);
      popNum(sb,"-"+diff, diff>=20?"super":"");
      if(diff>=20) popNum(sa,"超強！","super");
      burstAt(sa,[col,"#fff"],14,5);
    }else if(bv>av){
      sb.classList.add("win");
      projectile(sb,sa,col);
      popNum(sa,"-"+diff, diff>=20?"super":"");
      if(diff>=20) popNum(sb,"超強！","super");
      burstAt(sb,[col,"#fff"],14,5);
    }
    accA+=av; accB+=bv;
    // 戰力槽 + 頂端戰力同步累加
    const paBar=document.querySelector("#cardA .power-bar>i"), pbBar=document.querySelector("#cardB .power-bar>i");
    paBar.style.width=(accA/4)+"%"; pbBar.style.width=(accB/4)+"%";
    countUp(document.querySelector("#cardA .pnum"),accA,420);
    countUp(document.querySelector("#cardA .tnum"),accA,420);
    countUp(document.querySelector("#cardB .pnum"),accB,420);
    countUp(document.querySelector("#cardB .tnum"),accB,420);
    await sleep(640);
  }
  await sleep(200);

  // 3) 宣判
  const ta=total(a), tb=total(b);
  let msg;
  if(ta>tb){
    cardA.classList.add("is-winner"); cardB.classList.add("is-loser");
    setStars(cardA,ta-tb);
    msg=`🏆 ${a.m} 獲勝！<span class="sub">${ta} : ${tb}　領先 ${ta-tb} 分</span>`;
    await roundBanner("VICTORY!");
    celebrate(cardA);
  }else if(tb>ta){
    cardB.classList.add("is-winner"); cardA.classList.add("is-loser");
    setStars(cardB,tb-ta);
    msg=`🏆 ${b.m} 獲勝！<span class="sub">${tb} : ${ta}　領先 ${tb-ta} 分</span>`;
    await roundBanner("VICTORY!");
    celebrate(cardB);
  }else{
    msg=`🤝 平手！<span class="sub">兩支都是 ${ta} 分</span>`;
    burstAt(cardA,["#5b86f7","#ffd24a","#fff"],24,7); burstAt(cardB,["#e7277b","#27e6a0","#fff"],24,7);
  }
  v.innerHTML=msg; v.classList.add("show");

  busy=false;
  document.getElementById("battleBtn").disabled=false;
  document.getElementById("randomBtn").disabled=false;
}

function setStars(card,margin){
  const n = margin>=80?3 : margin>=30?2 : 1;
  card.querySelector(".stars").textContent="⭐".repeat(n);
}
function celebrate(card){
  fanfare();
  setTimeout(stampThud,150);
  const r=card.getBoundingClientRect();
  const colors=["#ffd24a","#27e6a0","#5b86f7","#e7277b","#ffffff"];
  for(let w=0;w<3;w++){
    setTimeout(()=>{
      spawn(r.left+10, r.top+10, 40, colors, 9);
      spawn(r.right-10, r.top+10, 40, colors, 9);
      spawn(r.left+r.width/2, r.top, 50, colors, 10);
    }, w*180);
  }
}
function countUp(el,to,dur){
  if(!el) return;
  const start=performance.now(), from=parseInt(el.textContent)||0;
  function step(now){
    const t=Math.min(1,(now-start)/dur), e=1-Math.pow(1-t,3);
    el.textContent=Math.round(from+(to-from)*e);
    if(t<1) requestAnimationFrame(step); else el.textContent=to;
  }
  requestAnimationFrame(step);
}

document.getElementById("randomBtn").addEventListener("click",()=>{
  if(busy)return;
  let i=Math.floor(Math.random()*PHONES.length),j;
  do{j=Math.floor(Math.random()*PHONES.length);}while(j===i);
  setSide("A",i); setSide("B",j); setTimeout(battle,300);
});
document.getElementById("resetBtn").addEventListener("click",()=>{if(busy)return;setSide("A","");setSide("B","");activeSide="A";updateActiveUI();});
document.getElementById("soundBtn").addEventListener("click",function(){
  soundOn=!soundOn; this.textContent=soundOn?"🔊 音效":"🔇 靜音"; if(soundOn) actx();
});
document.getElementById("musicBtn").addEventListener("click",function(){
  if(bgmTimer){stopBGM();} else {startBGM();}
});
const qrModal=document.getElementById("qrModal");
document.getElementById("qrBtn").addEventListener("click",()=>qrModal.classList.add("open"));
document.getElementById("qrClose").addEventListener("click",()=>qrModal.classList.remove("open"));
qrModal.addEventListener("click",e=>{if(e.target===qrModal)qrModal.classList.remove("open");});
// 空白鍵 / Enter 開戰
addEventListener("keydown",e=>{
  if((e.code==="Space"||e.code==="Enter") && !busy && state.A && state.B && qrModal.classList.contains("open")===false){
    e.preventDefault(); battle();
  }
});

// ---- 3D 傾斜：滑鼠 ----
["A","B"].forEach(side=>{
  const stage=document.getElementById("card"+side);
  stage.addEventListener("pointermove",e=>{
    const card=stage.querySelector(".card");
    if(!card||card.classList.contains("empty"))return;
    const r=stage.getBoundingClientRect();
    const px=(e.clientX-r.left)/r.width, py=(e.clientY-r.top)/r.height;
    card.style.setProperty("--tiltY",((px-0.5)*14).toFixed(1)+"deg");
    card.style.setProperty("--tiltX",((0.5-py)*14).toFixed(1)+"deg");
    card.style.setProperty("--mx",(px*100).toFixed(0)+"%");
    card.style.setProperty("--my",(py*100).toFixed(0)+"%");
  });
  stage.addEventListener("pointerleave",()=>{
    const card=stage.querySelector(".card"); if(!card)return;
    card.style.setProperty("--tiltY","0deg"); card.style.setProperty("--tiltX","0deg");
  });
});

// ---- 3D 傾斜：陀螺儀 ----
let gyroOn=false;
function onGyro(e){
  const ry=Math.max(-12,Math.min(12,(e.gamma||0)/3));
  const rx=Math.max(-12,Math.min(12,((e.beta||0)-45)/4));
  document.querySelectorAll(".card-stage .card").forEach(card=>{
    if(card.classList.contains("empty"))return;
    card.style.setProperty("--tiltY",ry.toFixed(1)+"deg");
    card.style.setProperty("--tiltX",(-rx).toFixed(1)+"deg");
  });
}
function enableGyro(){
  if(gyroOn||typeof DeviceOrientationEvent==="undefined")return;
  if(typeof DeviceOrientationEvent.requestPermission==="function"){
    DeviceOrientationEvent.requestPermission().then(s=>{
      if(s==="granted"){gyroOn=true;addEventListener("deviceorientation",onGyro);}
    }).catch(()=>{});
  }else{ gyroOn=true;addEventListener("deviceorientation",onGyro); }
}

// ---- 初始化 ----
buildRoster();
renderCard("A"); renderCard("B");
updateActiveUI();
